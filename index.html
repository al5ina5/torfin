<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <style>
      html,
      body {
        background-color: #131315;
      }
      html[data-theme='dark'],
      html[data-theme='dark'] body {
        background-color: #131315;
      }
      @media (prefers-color-scheme: dark) {
        html[data-theme='system'],
        html[data-theme='system'] body {
          background-color: #131315;
        }
      }
    </style>
    <script>
      ;(function () {
        var THEME_KEY = 'torfin.theme'
        var mode = 'dark'
        try {
          var stored = localStorage.getItem(THEME_KEY)
          if (stored === 'light' || stored === 'dark') mode = stored
        } catch (e) {}

        document.documentElement.dataset.theme = mode
        document.documentElement.style.colorScheme = mode === 'system' ? 'light dark' : mode

        var dark =
          mode === 'dark' ||
          (mode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
        var bg = dark ? '#131315' : '#f5f5f7'
        document.documentElement.style.background = bg

        var meta = document.querySelector('meta[name="theme-color"]')
        if (meta) meta.setAttribute('content', bg)

        var standalone =
          window.navigator.standalone === true ||
          window.matchMedia('(display-mode: standalone)').matches ||
          window.matchMedia('(display-mode: fullscreen)').matches ||
          window.matchMedia('(display-mode: minimal-ui)').matches
        var viewportMeta = document.querySelector('meta[name="viewport"]')
        if (viewportMeta) {
          viewportMeta.setAttribute(
            'content',
            'width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no' +
              (standalone ? ', viewport-fit=cover' : ''),
          )
        }
        if (standalone) {
          document.documentElement.dataset.standalone = 'true'
          document.documentElement.style.setProperty('--app-viewport-height', '100vh')
        }
      })()
    </script>
    <meta name="theme-color" content="#131315" />
    <meta name="description" content="Browse and stream your Torbox library." />
