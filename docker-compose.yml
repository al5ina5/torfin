services:
  torfin:
    build:
      context: .
      args:
        VITE_SERVER_API_KEY: ${VITE_SERVER_API_KEY:-}
    container_name: ${TORFIN_CONTAINER_NAME:-torfin}
    restart: unless-stopped
    user: "${TORFIN_USER:-1000:1000}"
    env_file:
      - ${TORFIN_ENV_FILE:-./data/jellyfin.env}
    ports:
      - "${TORFIN_PORT:-3020}:3020"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3020"
      TORBOX_DATA_DIR: /data
      TORBOX_DOWNLOAD_DIR: /media/movies
      JELLYFIN_PATH_MAP_FROM: /media/movies
      JELLYFIN_PATH_MAP_TO: /movies
      TORBOX_ARIA2_SPLIT: "16"
      TORBOX_ARIA2_CONNECTIONS: "16"
      TORBOX_ARIA2_CONCURRENT_DOWNLOADS: "10"
      TORBOX_ARIA2_MIN_SPLIT_SIZE: 1M
    volumes:
      - ${TORFIN_DATA_PATH:-./data}:/data
      - ${TORFIN_MEDIA_PATH:-./media/movies}:/media/movies
