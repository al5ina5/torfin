<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Torfin logo concepts</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: #f5f5f7;
        color: #1d1d1f;
        padding: 32px;
      }
      h1 { font-size: 20px; font-weight: 600; margin: 0 0 8px; }
      p { margin: 0 0 24px; color: rgba(60, 60, 67, 0.72); font-size: 14px; max-width: 640px; line-height: 1.5; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }
      .card {
        border: 1px solid rgba(60, 60, 67, 0.16);
        border-radius: 16px;
        overflow: hidden;
        background: #fff;
      }
      .card h2 {
        font-size: 13px;
        font-weight: 600;
        margin: 0;
        padding: 12px 16px 0;
      }
      .card .note {
        font-size: 12px;
        color: rgba(60, 60, 67, 0.6);
        padding: 4px 16px 12px;
        line-height: 1.4;
      }
      .swatches { display: flex; gap: 0; }
      .swatch {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 24px 16px;
        min-height: 140px;
      }
      .swatch.light { background: #fff; }
      .swatch.dark { background: #131315; }
      .swatch.mac { background: #131315; border-radius: 22%; width: 88px; height: 88px; margin: 0 auto; padding: 0; }
      .sizes {
        display: flex;
        align-items: flex-end;
        gap: 16px;
        padding: 16px;
        border-top: 1px solid rgba(60, 60, 67, 0.1);
        background: #fafafa;
      }
      .size { text-align: center; }
      .size span { display: block; font-size: 10px; color: rgba(60, 60, 67, 0.5); margin-top: 4px; }
      img { display: block; }
    </style>
  </head>
  <body>
    <h1>Torfin — T × fin concepts (v2)</h1>
    <p>
      Previous AI renders felt mascot-y (waves, wings, clipart). These are hand-built SVGs tested at
      favicon scale. Open this file in a browser and squint at the 16px row.
    </p>
    <div class="grid" id="grid"></div>
    <script>
      const concepts = [
        { file: '08-open-fin.svg', name: '08 · Open fin-T', note: 'Stroke T + asymmetric open dorsal curve. No closed loop.' },
        { file: '06-stroke-fin-t.svg', name: '06 · Stroke fin-T', note: 'SF Symbol weight — earlier attempt.' },
        { file: '05-unified-fin-t.svg', name: '05 · Unified fin-T', note: 'Solid fill — reads pawn-like at small size.' },
      ]
      const sizes = [16, 24, 32, 48]
      const grid = document.getElementById('grid')
      for (const c of concepts) {
        const card = document.createElement('div')
        card.className = 'card'
        card.innerHTML = `
          <h2>${c.name}</h2>
          <div class="note">${c.note}</div>
          <div class="swatches">
            <div class="swatch light"><img src="concepts/${c.file}" width="72" height="72" alt="" /></div>
            <div class="swatch dark"><img src="concepts/${c.file}" width="72" height="72" alt="" /></div>
          </div>
          <div class="sizes">
            ${sizes.map((s) => `<div class="size"><img src="concepts/${c.file}" width="${s}" height="${s}" alt="" /><span>${s}px</span></div>`).join('')}
            <div class="size"><div class="swatch mac"><img src="concepts/${c.file}" width="56" height="56" alt="" /></div><span>app icon</span></div>
          </div>
        `
        grid.appendChild(card)
      }
    </script>
  </body>
</html>
