name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Integration tests
        run: npm run test:transcode && npm run test:web-downloads && npm run test:server-api

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: UI tests
        run: |
          PORT=3026 node server.mjs &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:3026/api/health && break
            sleep 1
          done
          curl -sf http://127.0.0.1:3026/api/health
          UI_SMOKE_URL=http://127.0.0.1:3026/ npm run test:ui:all

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust format check
        run: cd src-tauri && cargo fmt --check

      - name: Rust clippy
        run: cd src-tauri && cargo clippy -- -D warnings

      - name: Rust test
        run: cd src-tauri && cargo test
