name: Deploy

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && (secrets.DEPLOY_PASSWORD != '' || secrets.DEPLOY_SSH_KEY != '') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and test
        run: npm run lint && npm run test

      - name: Build
        run: npm run build

      - name: Install deploy tools
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Write SSH key
        if: ${{ secrets.DEPLOY_SSH_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to remote Docker host
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PASSWORD: ${{ secrets.DEPLOY_PASSWORD }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY != '' && format('{0}/.ssh/deploy_key', env.HOME) || '' }}
          DEPLOY_REMOTE_DIR: ${{ secrets.DEPLOY_REMOTE_DIR || '~/torfin' }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '3020' }}
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_LEGACY_DATA_DIR: ${{ secrets.DEPLOY_LEGACY_DATA_DIR }}
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
          DEPLOY_MEDIA_PATH: ${{ secrets.DEPLOY_MEDIA_PATH }}
          DEPLOY_LEGACY_PROJECT: ${{ secrets.DEPLOY_LEGACY_PROJECT }}
          DEPLOY_DOCKER_USER: ${{ secrets.DEPLOY_DOCKER_USER }}
        run: node scripts/deploy-remote.mjs
